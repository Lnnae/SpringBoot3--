<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{common :: myheader}"></div>

<div class="container">
    <table class="table">
        <thead>
        <tr>
            <th scope="col">id</th>
            <th scope="col">name</th>
            <th scope="col">email</th>
            <th scope="col">age</th>
            <th scope="col">role</th>
            <th scope="col">status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="person, stats: ${persons}" >
            <th scope="row" th:text="${person.id}">1</th>
            <td th:text="${person.userName}"></td>
            <td th:if="${#strings.isEmpty(person.email)}" th:text='没有印象'></td>
            <td th:if="${not #strings.isEmpty(person.email)}" th:text="${person.email}"></td>
            <td th:text="|${person.age}  / ${person.age >= 18 ? '成年':'未成年'}|"></td>
            <td th:text="${person.role}"></td>
            <td >
                index: [[${stats.index}]] <br/>
                count: [[${stats.count}]] <br/>
                size: [[${stats.size}]] <br/>
                current: [[${stats.current}]] <br/>
                first: [[${stats.first}]] <br/>
                last: [[${stats.last}]] <br/>

            </td>
        </tr>
        </tbody>
    </table>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
